name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure .env is not tracked in git
        run: |
          if [ -n "$(git ls-files .env)" ]; then
            echo "::error::.env must not be committed — remove from index and rotate any exposed secrets"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate seed JSON (Pydantic + optional template contract)
        run: python scripts/validate_seed.py

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short
